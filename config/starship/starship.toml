# https://starship.rs/config

"$schema" = 'https://starship.rs/config-schema.json'

format = """
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

add_newline = false

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "green"

[directory]
format = "[$path]($style) "
truncate_to_repo = false
truncation_length = 10
fish_style_pwd_dir_length = 0
style = "blue"

[character]
success_symbol = "[‚ùØ](purple)"
error_symbol = "[‚ùØ](red)"
vimcmd_symbol = "[‚ùÆ](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](bright-black) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "‚Äã"
untracked = "‚Äã"
modified = "‚Äã"
staged = "‚Äã"
renamed = "‚Äã"
deleted = "‚Äã"
stashed = "‚â° "
diverged = "‚á°‚á£ "
ahead = "‚á° "
behind = "‚á£ "
up_to_date = "‚Äã"

[git_state]
format = '[ $state(\($progress_current/$progress_total\))]($style)'
style = "bright-black"
rebase = "rebasing"
merge = "merging"
revert = "reverting"
cherry_pick = "cherry-picking"
bisect = "bisecting"
am = "am"
am_or_rebase = "am/rebase"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"
